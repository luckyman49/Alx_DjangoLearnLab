{% extends "blog/base.html" %}
{% block content %}

<h2>Posts</h2>

{% if user.is_authenticated %}
<a href="{% url 'post-create' %}">Create Post</a>
{% endif %}

{% for post in posts %}
<h3>
  <a href="{% url 'post-detail' post.pk %}">
    {{ post.title }}
  </a>
</h3>
<p>{{ post.content|truncatewords:20 }}</p>
{% endfor %}

{% endblock %}
